<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Owl Carousel CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.min.css">
    <!-- External Custom CSS -->
    <!-- <link rel="stylesheet" href="style/x_ -->
    <link rel="stylesheet" href="style/x_style.css">
    <link rel="stylesheet" href="style/z_style.css">
    <title>Cart</title>
    <style>
        /* Cart table: keep header and body columns perfectly aligned */
        .z_cart_table {
            --z-cart-cols: 1.6fr 0.45fr 0.7fr 0.45fr;
        }

        .z_cart_table_head,
        .z_cart_row {
            display: grid;
            grid-template-columns: var(--z-cart-cols);
        }

        .z_cart_table_head>div,
        .z_cart_row>div {
            width: 100%;
            text-align: left;
        }
    </style>

</head>

<body>

    <div id="header-container"></div>

    <div class="z_cart_page">

        <div class="z_cart_container">
            <div class="z_cart_header_area">
                <h1 class="z_cart_title">Shopping Cart</h1>
                <p class="z_cart_subtitle">
                    Review your selected items, update quantities, and get ready for a smooth and easy checkout
                    experience.
                </p>
            </div>

            <!-- <div class="z_cart_timer">
                <i class="fa-solid fa-bolt"></i>
                <span>Your cart will expire in</span>
                <strong class="z_timer_value">04:17</strong>
                <span>minutes! Please checkout now before your items sell out!</span>
            </div> -->

            <div class="z_cart_layout">
                <div class="z_cart_left">
                    <div class="z_cart_table_wrap">
                        <div class="z_cart_table">
                            <div class="z_cart_table_head">
                                <div class="z_cart_th z_col_product">Products</div>
                                <div class="z_cart_th">Price</div>
                                <div class="z_cart_th">Quantity</div>
                                <div class="z_cart_th">Total Price</div>
                            </div>

                            <!-- Cart items will be dynamically inserted here -->

                        </div>
                    </div>

                    <div class="z_cart_coupon">
                        <select class="z_coupon_input z_coupons_dropdown">
                            <option value="">Select a coupon</option>
                            <!-- Coupons will be dynamically inserted here -->
                        </select>
                        <button class="z_coupon_btn">Apply Code</button>
                    </div>
                </div>

                <aside class="z_cart_summary">
                    <!-- <div class="z_summary_notice">
                        <span>Buy</span>
                        <strong>$70.00</strong>
                        <span>more to get freeship</span>
                        <div class="z_summary_progress">
                            <span class="z_summary_progress_fill"></span>
                        </div>
                    </div> -->

                    <div class="z_summary_block">
                        <h3>Order Summary</h3>
                        <div class="z_summary_row">
                            <span>Subtotal</span>
                            <span id="zSubtotal">$149.97</span>
                        </div>
                        <div class="z_summary_row">
                            <span>Discounts</span>
                            <span id="zDiscount">-$0.00</span>
                        </div>
                        <div class="z_summary_row z_summary_ship">
                            <div>
                                <span>Shipping</span>
                                <label class="z_ship_option">
                                    <input type="radio" name="ship" checked data-ship="0"> Free Shipping
                                </label>
                                <label class="z_ship_option">
                                    <input type="radio" name="ship" data-ship="35"> Local: $35.00
                                </label>
                                <label class="z_ship_option">
                                    <input type="radio" name="ship" data-ship="35"> Flat Rate: $35.00
                                </label>
                            </div>
                            <span id="zShipping">$0.00</span>
                        </div>
                        <div class="z_summary_total">
                            <span>Total</span>
                            <strong id="zTotal">$149.97</strong>
                        </div>
                        <label class="z_summary_terms">
                            <input type="checkbox">
                            <span>I agree with the <a href="#">terms and conditions</a></span>
                        </label>
                        <a href="Checkout.html" class="z_summary_btn btn">
                            Process To Checkout
                        </a>
                        <a class="z_summary_link" href="Shop.html">Or Continue Shopping</a>
                    </div>
                </aside>
            </div>

        
        </div>
    </div>
    </div>

    <div id="footer"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>
    <script src="js/s_style.js"></script>
    <script src="./js/wishlist.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/script.js"></script>
    <script src="./js/cart.js"></script>
    <script>
        // Cart page automatically loads cart items via cart.js renderCartPage()
        // The cart.js now works with nested format: {id, userId, items: [{id, quantity}]}
        // Product details are fetched dynamically from products API
    </script>

    <script>
        $(document).ready(function () {
            $(".owl-carousel").owlCarousel({
                loop: true,
                margin: 10,
                nav: true,
                /* ? AUTO SCROLL */
                autoplay: true,
                autoplayTimeout: 3000,      // 3 seconds
                autoplayHoverPause: true,   // pause on hover
                smartSpeed: 800,
                navText: [
                    '<i class="fa-solid fa-chevron-left"></i>',
                    '<i class="fa-solid fa-chevron-right"></i>'
                ],
                responsive: {
                    0: {
                        items: 1
                    },
                    600: {
                        items: 3
                    },
                    1000: {
                        items: 4
                    }
                }
            });
        });
    </script>
</body>

</html>
