<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Quicksand:wght@400;600&display=swap"
        rel="stylesheet">
    <title>Order Confirmed</title>
    <link rel="stylesheet" href="/style/x_style.css">
    <link rel="stylesheet" href="/style/d_style.css">
    <link rel="stylesheet" href="/style/z_style.css">

    <style>
        :root {
            --z_pinterest_pink: #fcefed;
            --z_pinterest_accent: #94a691;
            /* Muted Gold/Brown */
            --z_pinterest_text: #4a4e69;
            --z_pinterest_white: #ffffff;
        }

        body {
            background-color: #fffafb;
            font-family: 'Quicksand', sans-serif;
            color: var(--z_pinterest_text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Soft Floating Blobs in Background */
        .z_bg_blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: var(--z_pinterest_pink);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.6;
        }

        .z_success_page {
            /* min-height: 85vh; */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .z_success_card {
            max-width: 550px;
            width: 100%;
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 40px;
            /* Pinterest Extra Round */
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(212, 163, 115, 0.1);
            position: relative;
            animation: z_fadeUp 0.8s ease-out;
        }

        @keyframes z_fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .z_success_icon {
            width: 90px;
            height: 90px;
            margin: 0 auto 30px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--z_pinterest_accent);
            font-size: 2.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--z_pinterest_pink);
        }

        .z_success_title {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-style: italic;
            font-weight: 600;
            color: #222;
            margin-bottom: 15px;
        }

        .z_success_msg {
            color: #777;
            font-size: 16px;
            margin-bottom: 5px;
            font-weight: 400;
        }

        .z_success_order {
            font-size: 13px;
            color: var(--z_pinterest_accent);
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 40px;
            display: inline-block;
            background: var(--z_pinterest_pink);
            padding: 5px 20px;
            border-radius: 20px;
        }

        .z_success_actions {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .z_success_actions a {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .z_btn_continue {
            background: var(--z_pinterest_accent);
            color: #fff;
            border: none;
            box-shadow: 0 10px 20px rgba(212, 163, 115, 0.2);
        }

        .z_btn_continue:hover {
            background: #c29263;
            color: #fff;
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(212, 163, 115, 0.3);
        }

        .z_btn_home {
            background: #fff;
            color: var(--z_pinterest_accent);
            border: 1px solid var(--z_pinterest_accent);
        }

        .z_btn_home:hover {
            background: var(--z_pinterest_pink);
            transform: translateY(-3px);
        }

        /* Mobile Adjustments */
        @media (max-width: 576px) {
            .z_success_card {
                padding: 40px 20px;
                border-radius: 30px;
            }

            .z_success_title {
                font-size: 1.8rem;
            }

            .z_success_actions {
                flex-direction: column;
            }

            .z_success_actions a {
                width: 100%;
                justify-content: center;
            }

            .z_bg_blob {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <div class="z_bg_blob" style="top: -100px; left: -100px;"></div>
    <div class="z_bg_blob" style="bottom: -100px; right: -100px;"></div>

    <div id="header-container"></div>

    <div class="z_success_page">
        <div class="z_success_card">
            <div style="position: absolute; top: 20px; right: 40px; color: var(--z_pinterest_accent); opacity: 0.4;">
                <i class="fa-solid fa-sparkles fa-2x"></i>
            </div>

            <div class="z_success_icon">
                <i class="fa-solid fa-check"></i>
            </div>

            <h1 class="z_success_title">Thank you for your order</h1>
            <p class="z_success_msg">Your order has been placed successfully.</p>
            <p class="z_success_order">Order ID: <span id="orderId">...</span></p>

            <div class="z_success_actions">
                <a href="shop.html" class="z_btn_continue">
                    <i class="fa-solid fa-bag-shopping"></i> Shop More
                </a>
                <a href="Home.html" class="z_btn_home">
                    <i class="fa-solid fa-house"></i> Home
                </a>
            </div>

            <p style="margin-top: 30px; font-size: 0.85rem; color: #aaa;">
                A confirmation email is flying to your inbox.
            </p>
        </div>
    </div>

    <div id="footer"></div>
    <!-- Bootstrap JS -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/script.js"></script>
    <script src="./js/header.js"></script>
    <script src="./js/cart.js"></script>
    <script src="./js/wishlist.js"></script>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search);
            var orderId = params.get("order") || localStorage.getItem("lastOrderId") || "ORD-" + Math.random().toString(36).substr(2, 9).toUpperCase();
            var el = document.getElementById("orderId");
            if (el) el.textContent = orderId;
        })();
    </script>
</body>

</html>
